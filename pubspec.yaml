name: share_way
description: "AI-Powered Ride-Sharing Mobile Application for Urban Commuters"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Maps (OpenStreetMap)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^11.0.0

  # HTTP
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.2.0

  # UI Utilities
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shimmer: ^3.0.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Utils
  uuid: ^4.3.3
  timeago: ^3.6.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1B8A6B"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/splash.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/splash.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
