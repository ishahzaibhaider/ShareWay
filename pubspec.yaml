name: share_way
description: "AI-Powered Ride-Sharing Mobile Application for Urban Commuters"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Google Maps
  google_maps_flutter: ^2.6.0

  # Location & Geocoding
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # HTTP
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.2.0

  # UI Utilities
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shimmer: ^3.0.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Utils
  uuid: ^4.3.3
  timeago: ^3.6.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
